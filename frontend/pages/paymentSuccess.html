<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Payment Successful</title>
    <link rel="stylesheet" href="../css/paymentSuccess.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">
        <h2>Ticket Bridge</h2>
      </div>

      <div class="nav-links">
        <a href="#" id="homeLink">Home</a>
        <a href="#" id="searchLink">Search</a>
        <a href="#" id="uploadLink">Upload Ticket</a>
        <a href="#" id="myTicketsLink">My Tickets</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </nav>

    <div class="success-section">
      <div class="success-icon">
        <h1>✅</h1>
      </div>

      <div class="success-message">
        <p>
          Thank you,
          <span id="buyerName"></span>!
        </p>

        <p>
          Your
          <span id="ticketType"></span>
          has been purchased successfully.
        </p>
      </div>

      <div class="ticket-summary">
        <h3>Ticket Summary</h3>

        <p>
          <strong>Ticket Type:</strong>
          <span id="summaryTicketType"></span>
        </p>

        <p>
          <strong>Operator:</strong>
          <span id="operator"></span>
        </p>

        <p>
          <strong>Route:</strong>
          <span id="route"></span>
        </p>

        <p>
          <strong>Date:</strong>
          <span id="travelDate"></span>
        </p>

        <p>
          <strong>Seat Number:</strong>
          <span id="seatNumber"></span>
        </p>

        <p>
          <strong>Ticket Number:</strong>
          <span id="ticketNumber"></span>
        </p>

        <p>
          <strong>Amount Paid:</strong>
          ₹<span id="amountPaid"></span>
        </p>
      </div>

      <div class="action-buttons">
        <button id="myTicketsButton" class="tickets-btn">
          View My Tickets
        </button>

        <button id="homeButton" class="home-btn">Back To Home</button>
      </div>
    </div>
    <script src="../js/paymentSuccess.js"></script>
    <script src="../js/navbar.js"></script>
  </body>
</html>
