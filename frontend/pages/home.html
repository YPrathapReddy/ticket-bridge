<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../css/home.css" />
    <title>Home</title>
  </head>
  <body>
    <div class="main-container">
      <div class="nav-container">
        <nav class="navbar">
          <div class="logo">
            <h2>Ticket Bridge</h2>
          </div>

          <div class="nav-links">
            <a href="#" id="homeLink">Home</a>
            <a href="#" id="searchLink">Search</a>
            <a href="#" id="uploadLink">Upload Ticket</a>
            <a href="#" id="myTicketsLink">My Tickets</a>
            <a href="#" id="logoutLink">Logout</a>
          </div>
        </nav>
      </div>
      <div class="hero-section">
        <h2 class="heading">Find Your Ticket</h2>
        <div class="search-form">
          <form id="searchForm">
            <div class="from-input">
              <label for="fromSearch">From</label>
              <input
                type="text"
                id="fromSearch"
                name="fromSearch"
                placeholder="From Place"
                required
              />
            </div>
            <div class="to-input">
              <label for="toSearch">To</label>
              <input
                type="text"
                id="toSearch"
                name="toSearch"
                placeholder="To Place"
                required
              />
            </div>
            <div class="date-input">
              <label for="travelDateSearch">Date</label>
              <input
                type="date"
                id="travelDateSearch"
                name="travelDateSearch"
              />
            </div>
            <div class="search-button">
              <button class="search-btn" type="submit">Search Ticket</button>
            </div>
          </form>
        </div>
      </div>
      <div class="categories-section">
        <h2 class="section-heading">Popular Categories</h2>
        <div class="categories-container">
          <div class="category-card">
            <span class="icon">🚌</span>
            <h3 class="category-title">Bus</h3>
          </div>
          <div class="category-card">
            <span class="icon">🚆</span>
            <h3 class="category-title">Train</h3>
          </div>
          <div class="category-card">
            <span class="icon">🎬</span>
            <h3 class="category-title">Movie</h3>
          </div>
          <div class="category-card">
            <span class="icon">⚽</span>
            <h3 class="category-title">Sports</h3>
          </div>
          <div class="category-card">
            <span class="icon">🎤</span>
            <h3 class="category-title">Events</h3>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/home.js"></script>
    <script src="../js/navbar.js"></script>
  </body>
</html>
